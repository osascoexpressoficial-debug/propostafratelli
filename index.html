<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Osasco Express">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#ea1d2c">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Osasco Express</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --red:#ea1d2c;
  --bg:#f7f7f5;
  --white:#fff;
  --txt:#3e3e3e;
  --t2:#717171;
  --t3:#a0a0a0;
  --border:#e0dfd9;
  --s1:#f2f1ee;
  --f:-apple-system,BlinkMacSystemFont,'Segoe UI','Nunito Sans',Helvetica,Arial,sans-serif;
}
html,body{height:100%;background:var(--bg);font-family:var(--f);-webkit-font-smoothing:antialiased;overflow:hidden;}

/* ── SHELL ── */
.app{display:flex;flex-direction:column;height:100%;height:calc(var(--vh,1vh)*100);}

/* ── TOPBAR ── */
.topbar{
  background:var(--white);
  border-bottom:1px solid var(--border);
  padding:0 16px;
  padding-top:env(safe-area-inset-top,0);
  height:calc(52px + env(safe-area-inset-top,0));
  display:flex;align-items:flex-end;justify-content:space-between;
  padding-bottom:0;
  flex-shrink:0;
  box-shadow:0 1px 0 var(--border);
}
.topbar-inner{display:flex;align-items:center;justify-content:space-between;width:100%;height:52px;}
.brand{display:flex;align-items:center;gap:9px;}
.brand-icon{width:32px;height:32px;background:var(--red);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.brand-name{font-size:15px;font-weight:800;color:var(--txt);}
.brand-sub{font-size:10px;color:var(--t3);margin-top:1px;}
.print-btn{
  background:var(--red);color:#fff;
  padding:6px 14px;border-radius:99px;
  font-size:11px;font-weight:700;border:none;cursor:pointer;
  font-family:var(--f);white-space:nowrap;
  display:none;
}

/* ── CONTENT ── */
.content{flex:1;position:relative;overflow:hidden;}
.screen{position:absolute;inset:0;width:100%;height:100%;border:none;background:var(--bg);transition:opacity .18s ease;}
.screen.off{opacity:0;pointer-events:none;}

/* ── BOTTOM NAV ── */
.bottom-nav{
  background:var(--white);
  border-top:1px solid var(--border);
  padding-bottom:env(safe-area-inset-bottom,0);
  flex-shrink:0;
  display:flex;
}
.tab{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:9px 4px;border:none;background:none;
  color:var(--t3);font-family:var(--f);font-size:9.5px;font-weight:700;
  cursor:pointer;letter-spacing:.3px;
  -webkit-tap-highlight-color:transparent;
  transition:color .12s;
}
.tab.active{color:var(--red);}
.tab-icon{font-size:20px;line-height:1.1;}

/* ── LOADING ── */
.loading{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:12px;
  background:var(--bg);font-size:12px;color:var(--t3);
}
.loading-spin{font-size:32px;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── DESKTOP ── */
@media(min-width:768px){
  .print-btn{display:block;}
  .tab-icon{font-size:18px;}
  .tab{font-size:10px;}
}
</style>
</head>
<body>
<div class="app">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <div class="brand-icon">🛵</div>
        <div>
          <div class="brand-name">Osasco Express</div>
          <div class="brand-sub" id="screen-label">Dashboard</div>
        </div>
      </div>
      <button class="print-btn" id="print-btn" onclick="printScreen()">🖨️ Imprimir</button>
    </div>
  </div>

  <!-- SCREENS -->
  <div class="content" id="content">
    <div class="loading" id="loading"><div class="loading-spin">⚙️</div><div>Carregando...</div></div>
    <iframe id="s-dashboard" class="screen off" src="dashboard.html" onload="onLoad('s-dashboard')"></iframe>
    <iframe id="s-proposta"  class="screen off" src="proposta.html"  onload="onLoad('s-proposta')"></iframe>
    <iframe id="s-orcamento" class="screen off" src="orcamento.html" onload="onLoad('s-orcamento')"></iframe>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <button class="tab active" id="tab-dashboard" onclick="show('dashboard')">
      <span class="tab-icon">📊</span><span>Dashboard</span>
    </button>
    <button class="tab" id="tab-proposta" onclick="show('proposta')">
      <span class="tab-icon">📄</span><span>Proposta</span>
    </button>
    <button class="tab" id="tab-orcamento" onclick="show('orcamento')">
      <span class="tab-icon">🤖</span><span>Orçamento</span>
    </button>
  </nav>

</div>

<script>
// Fix 100vh on mobile (iOS Safari)
function setVH(){document.documentElement.style.setProperty('--vh',window.innerHeight*.01+'px');}
setVH();window.addEventListener('resize',setVH);

const LABELS = {dashboard:'Dashboard Fratelli',proposta:'Proposta Comercial',orcamento:'Orçamento IA'};
let current = 'dashboard';
let loaded = {};

function onLoad(id){
  loaded[id.replace('s-','')] = true;
  if(id === 's-'+current){
    document.getElementById('loading').style.display = 'none';
    document.getElementById(id).classList.remove('off');
  }
}

function show(name){
  // Update nav tabs
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');

  // Update label
  document.getElementById('screen-label').textContent = LABELS[name];

  // Show/hide screens
  document.querySelectorAll('.screen').forEach(s=>s.classList.add('off'));

  const screen = document.getElementById('s-'+name);
  if(loaded[name]){
    document.getElementById('loading').style.display = 'none';
    screen.classList.remove('off');
  } else {
    document.getElementById('loading').style.display = 'flex';
  }
  current = name;
}

function printScreen(){
  const frame = document.getElementById('s-'+current);
  if(frame && frame.contentWindow) frame.contentWindow.print();
}

// Register PWA service worker
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

// Start on dashboard
show('dashboard');
</script>
</body>
</html>
